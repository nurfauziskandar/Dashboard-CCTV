<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pelco Storage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f1117; --bg-card: #181b23; --bg-input: #1e2130;
            --border-color: #2a2d3a; --text-primary: #e4e6ef; --text-secondary: #8b8fa3;
            --accent: #4f7cff; --danger: #e74c3c;
        }
        body {
            background: var(--bg-primary); color: var(--text-primary);
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 32px; width: 100%; max-width: 380px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .login-icon {
            width: 56px; height: 56px; border-radius: 14px;
            background: rgba(79,124,255,0.15); color: var(--accent);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; font-size: 1.6rem;
        }
        .form-control {
            background: var(--bg-input); border-color: var(--border-color);
            color: var(--text-primary);
        }
        .form-control:focus {
            background: var(--bg-input); border-color: var(--accent);
            color: var(--text-primary); box-shadow: 0 0 0 2px rgba(79,124,255,0.2);
        }
        .btn-accent {
            background: var(--accent); color: #fff; border: none;
        }
        .btn-accent:hover { background: #3d6ae8; color: #fff; }
        .alert-danger {
            background: rgba(231,76,60,0.1); border-color: rgba(231,76,60,0.3);
            color: var(--danger);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-icon">
            <i class="fa-solid fa-hard-drive"></i>
        </div>
        <h5 class="text-center mb-1" style="font-weight: 700;">Pelco Storage</h5>
        <p class="text-center mb-4" style="color: var(--text-secondary); font-size: 0.85rem;">
            Sign in to access management UI
        </p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} py-2 px-3 mb-3" style="font-size: 0.85rem;">
            {{ message }}
        </div>
        {% endfor %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}" autocomplete="off">
            <input type="hidden" name="next" value="{{ next }}">
            <div class="mb-3">
                <label class="form-label" style="font-size: 0.85rem;">Username</label>
                <input type="text" class="form-control" name="username" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label" style="font-size: 0.85rem;">Password</label>
                <input type="password" class="form-control" name="password" required>
            </div>
            <button type="submit" class="btn btn-accent w-100">
                <i class="fa-solid fa-right-to-bracket me-1"></i> Sign In
            </button>
        </form>
    </div>
</body>
</html>
