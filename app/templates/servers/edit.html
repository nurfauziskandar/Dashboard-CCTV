{% extends "base.html" %}

{% block title %}Edit {{ server.name }}{% endblock %}
{% block page_title %}Edit Server{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card">
            <div class="card-header">
                <i class="fa-solid fa-pen me-2"></i>Edit Server — {{ server.name }}
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('servers.edit', server_id=server.id) }}">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Server Name</label>
                            <input type="text" class="form-control" name="name"
                                   value="{{ server.name }}" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">IP Address</label>
                            <input type="text" class="form-control" name="ip_address"
                                   value="{{ server.ip_address }}" required
                                   placeholder="192.168.1.10">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" name="description" rows="2">{{ server.description or '' }}</textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Server Type</label>
                            <select class="form-select" name="server_type">
                                <option value="vxstorage" {{ 'selected' if server.server_type == 'vxstorage' }}>Pelco VX Storage</option>
                                <option value="endura" {{ 'selected' if server.server_type == 'endura' }}>Pelco Endura</option>
                                <option value="other" {{ 'selected' if server.server_type == 'other' }}>Other</option>
                            </select>
                        </div>

                        <div class="col-12">
                            <hr style="border-color: var(--border);">
                            <div style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px;">
                                <i class="fa-solid fa-server me-1"></i>iDRAC / Management (biarkan kosong jika tidak diubah)
                            </div>
                        </div>
                        <div class="col-8">
                            <label class="form-label">iDRAC IP</label>
                            <input type="text" class="form-control" name="idrac_ip"
                                   value="{{ server.idrac_ip or '' }}"
                                   placeholder="192.168.1.11">
                        </div>
                        <div class="col-4">
                            <label class="form-label">iDRAC Port</label>
                            <input type="number" class="form-control" name="idrac_port"
                                   value="{{ server.idrac_port or 443 }}">
                        </div>
                        <div class="col-6">
                            <label class="form-label">iDRAC Username</label>
                            <input type="text" class="form-control" name="idrac_username"
                                   value="{{ server.idrac_username or '' }}">
                        </div>
                        <div class="col-6">
                            <label class="form-label">iDRAC Password <span style="font-size:0.8rem; color:var(--text-muted);">(kosong = tidak diubah)</span></label>
                            <input type="password" class="form-control" name="idrac_password"
                                   placeholder="Biarkan kosong jika tidak diubah">
                        </div>

                        <div class="col-12">
                            <hr style="border-color: var(--border);">
                            <div style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px;">
                                <i class="fa-solid fa-network-wired me-1"></i>SNMP (untuk Endura)
                            </div>
                        </div>
                        <div class="col-12">
                            <label class="form-label">SNMP Community</label>
                            <input type="text" class="form-control" name="snmp_community"
                                   value="{{ server.snmp_community or 'public' }}">
                        </div>

                        <div class="col-12 mt-3">
                            <button type="submit" class="btn btn-accent">
                                <i class="fa-solid fa-floppy-disk me-1"></i> Save Changes
                            </button>
                            <a href="{{ url_for('servers.detail', server_id=server.id) }}" class="btn btn-ghost ms-2">
                                Cancel
                            </a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
