<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dashboard CCTV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <style>
        body {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: var(--bg-primary, #0f1117);
        }
        .login-card {
            background: var(--bg-card, #181b23);
            border: 1px solid var(--border-color, #2a2d3a);
            border-radius: 12px; padding: 32px; width: 100%; max-width: 380px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .login-icon {
            width: 56px; height: 56px; border-radius: 14px;
            background: rgba(79,124,255,0.15);
            color: var(--accent, #4f7cff);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; font-size: 1.6rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-icon">
            <i class="fa-solid fa-video"></i>
        </div>
        <h5 class="text-center mb-1" style="font-weight: 700;">Dashboard CCTV</h5>
        <p class="text-center mb-4" style="color: var(--text-secondary); font-size: 0.85rem;">
            Sign in untuk melanjutkan
        </p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} py-2 px-3 mb-3" style="font-size: 0.85rem;">
            {{ message }}
        </div>
        {% endfor %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}" autocomplete="off">
            <input type="hidden" name="next" value="{{ next }}">
            <div class="mb-3">
                <label class="form-label" style="font-size: 0.85rem;">Username</label>
                <input type="text" class="form-control" name="username" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label" style="font-size: 0.85rem;">Password</label>
                <input type="password" class="form-control" name="password" required>
            </div>
            <button type="submit" class="btn btn-accent w-100">
                <i class="fa-solid fa-right-to-bracket me-1"></i> Sign In
            </button>
        </form>
    </div>
</body>
</html>
